# Secretary (Optimal Stopping) environment settings

env_name: secretary
default_num_episodes: 10

env_params:
  num_draws: 10

prompts: ["no_info", "some_info", "full_info"]
feedbacks: ["standard"]

latent_summary:
  easy: 12       # best_is_last/first, fixed_position_*, half_bias, low/high_bar
  medium: 5      # alternating, increasing/decreasing quality, position_shift, rotation
  hard: 7        # twin_peaks, step_function, sorted/inverse, prime, valley/mountain
  very_hard: 6   # fibonacci, modular, mirror, bimodal, clustered, random_walk
  total: 30

notes:
  - "All latents are cross-episode (generator-based, not filter-based)"
  - "Classic 37% rule achieves ~37% success on uniform random"
  - "Easy latents allow 100% success with the right strategy"
